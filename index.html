<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABHIGYAN VAULT PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
overflow-x:hidden;
}

.container{
max-width:420px;
margin:20px auto;
padding:20px;
background:rgba(255,255,255,0.06);
border-radius:20px;
backdrop-filter:blur(15px);
}

input,button,textarea{
width:100%;
margin:10px 0;
padding:12px;
border-radius:10px;
border:none;
}

button{
background:#00ffd5;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none;}

h1{text-align:center;color:#00ffd5;}

.box{
background:#111827;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px;
background:#1f2937;
margin:5px 0;
border-radius:8px;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
}
</style>
</head>

<body>

<div class="container" id="loginPage">
<h1>LOGIN</h1>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Enter</button>
</div>

<div class="container hidden" id="app">

<h1>💰 VAULT</h1>

<div class="box">
Balance: <span id="bal">0</span>
</div>

<input id="amt" type="number" placeholder="amount">
<button onclick="add()">ADD</button>
<button onclick="remove()">REMOVE</button>

<div class="box">
<h3>History</h3>
<div id="hist"></div>
</div>

<div class="box">
<h3>Leaderboard</h3>
<div id="board"></div>
</div>

<div class="box">
<h3>LTC</h3>
<canvas id="c1"></canvas>
</div>

<div class="box">
<h3>Reviews</h3>
<input id="rn" placeholder="name">
<textarea id="rt"></textarea>
<input id="rs" type="number" placeholder="stars">
<button onclick="review()">Post</button>
<div id="rev"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

let u="";

function login(){
u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!u||!p)return;

let sp=localStorage.getItem(u+"_p");

if(sp && sp!=p){
alert("wrong");return;
}

if(!sp){
localStorage.setItem(u+"_p",p);
localStorage.setItem(u+"_m",0);
localStorage.setItem(u+"_h",JSON.stringify([]));
}

localStorage.setItem("lu",u);

show();
}

function show(){
u=localStorage.getItem("lu");

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

bal();hist();board();chart();rev();ltc();
}

/* MONEY */

function bal(){
document.getElementById("bal").innerText=
localStorage.getItem(u+"_m")||0;
}

function add(){
let a=+amt.value;
let m=+localStorage.getItem(u+"_m")||0;
m+=a;
localStorage.setItem(u+"_m",m);
log("added "+a);
bal();hist();board();
}

function remove(){
let a=+amt.value;
let m=+localStorage.getItem(u+"_m")||0;
m-=a;if(m<0)m=0;
localStorage.setItem(u+"_m",m);
log("removed "+a);
bal();hist();board();
}

/* HISTORY */

function log(t){
let h=JSON.parse(localStorage.getItem(u+"_h")||"[]");
h.unshift(t);
localStorage.setItem(u+"_h",JSON.stringify(h));
}

function hist(){
let h=JSON.parse(localStorage.getItem(u+"_h")||"[]");
hist.innerHTML=h.map(x=>"<div>"+x+"</div>").join("");
}

/* LEADERBOARD */

function board(){
let arr=[];
for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.endsWith("_m")){
arr.push({n:k.replace("_m",""),v:+localStorage.getItem(k)});
}
}
arr.sort((a,b)=>b.v-a.v);

board.innerHTML=arr.map((x,i)=>
`<div class='item'><span>#${i+1} ${x.n}</span><span>${x.v}</span></div>`
).join("");
}

/* CHART */

let ch;

function chart(){
let ctx=c1;
ch=new Chart(ctx,{
type:"line",
data:{labels:["a","b"],datasets:[{data:[0,+localStorage.getItem(u+"_m")]}]}
});
}

/* LTC */

function ltc(){
let d=[80,82,85,88,90];

setInterval(()=>{
d.shift();
d.push(80+Math.random()*20);
ch.data.datasets[0].data=[0,+localStorage.getItem(u+"_m")];
ch.update();
},3000);
}

/* REVIEWS */

function review(){
let r=JSON.parse(localStorage.getItem("r")||"[]");
r.unshift(rn.value+" : "+rt.value+" ⭐"+rs.value);
localStorage.setItem("r",JSON.stringify(r));
rev();
}

function rev(){
let r=JSON.parse(localStorage.getItem("r")||"[]");
rev.innerHTML=r.map(x=>"<div>"+x+"</div>").join("");
}

function logout(){
localStorage.removeItem("lu");
location.reload();
}

show();

</script>

</body>
</html>
