<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Simple</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1020;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:300px;
background:#111a2e;
padding:20px;
border-radius:15px;
text-align:center;
}

input,button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
background:#00ffd5;
font-weight:bold;
cursor:pointer;
}

h1{color:#00ffd5;}
</style>
</head>

<body>

<div class="box">

<h1>💰 BALANCE</h1>

<h2>₹<span id="bal">0</span></h2>

<input id="amt" type="number" placeholder="Add amount">

<button onclick="add()">ADD BALANCE</button>
<button onclick="reset()">RESET</button>

</div>

<script>

let balValue = 0;

/* LOAD SAVED */
if(localStorage.getItem("balance")){
balValue = +localStorage.getItem("balance");
document.getElementById("bal").innerText = balValue;
}

/* ADD */
function add(){
let a = +amt.value;

if(!a || a<=0) return;

balValue += a;

localStorage.setItem("balance", balValue);

document.getElementById("bal").innerText = balValue;

amt.value="";
}

/* RESET */
function reset(){
balValue = 0;
localStorage.setItem("balance", 0);
document.getElementById("bal").innerText = 0;
}

</script>

</body>
</html>
