<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABHIGYAN VAULT PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* 🌌 ANIMATED BACKGROUND */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffd5,transparent);
filter:blur(120px);
top:-100px;
left:-100px;
animation:move1 6s infinite alternate;
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#7c3aed,transparent);
filter:blur(120px);
bottom:-100px;
right:-100px;
animation:move2 8s infinite alternate;
}

@keyframes move1{
from{transform:translate(0,0) scale(1);}
to{transform:translate(80px,80px) scale(1.2);}
}

@keyframes move2{
from{transform:translate(0,0) scale(1);}
to{transform:translate(-80px,-60px) scale(1.3);}
}

/* FLOATING PARTICLES */
.particle{
position:fixed;
width:5px;
height:5px;
background:#00ffd5;
border-radius:50%;
animation:float linear infinite;
opacity:0.7;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* CONTAINER */
.container{
width:92%;
max-width:420px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
border-radius:18px;
padding:20px;
border:1px solid rgba(255,255,255,0.1);
z-index:2;
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

/* TITLE */
h1{
text-align:center;
color:#00ffd5;
margin-bottom:10px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #00ffd5;}
to{text-shadow:0 0 20px #00ffd5;}
}

/* INPUT */
input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#111a2e;
color:white;
outline:none;
transition:0.3s;
}

input:focus{
transform:scale(1.02);
box-shadow:0 0 10px #00ffd5;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00ffd5;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ffd5;
}

.red{background:#ff4d4d;color:white;}
.blue{background:#3b82f6;color:white;}

.hidden{display:none;}

.box{
background:#0f172a;
padding:12px;
margin-top:10px;
border-radius:12px;
animation:slideUp 0.5s ease;
}

@keyframes slideUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.item{
display:flex;
justify-content:space-between;
padding:6px;
background:#111827;
margin:5px 0;
border-radius:8px;
transition:0.3s;
}

.item:hover{
transform:scale(1.03);
background:#1f2937;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
}
</style>
</head>

<body>

<script>
/* 🌟 PARTICLES */
for(let i=0;i<60;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(3+Math.random()*5)+"s";
p.style.opacity=Math.random();
p.style.width=p.style.height=(2+Math.random()*4)+"px";
document.body.appendChild(p);
}
</script>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h1>💸 VAULT LOGIN</h1>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
</div>

<!-- APP -->
<div class="container hidden" id="app">

<h1>💰 VAULT PRO</h1>

<div class="box">Balance: ₹<span id="bal">0</span></div>

<input id="amt" type="number" placeholder="Amount">

<button onclick="add()">+ ADD</button>
<button class="red" onclick="remove()">- REMOVE</button>
<button class="blue" onclick="reset()">RESET</button>

<div class="box">
<h3>History</h3>
<div id="hist"></div>
</div>

<div class="box">
<h3>Leaderboard</h3>
<div id="board"></div>
</div>

<div class="box">
<h3>Chart</h3>
<canvas id="c1"></canvas>
</div>

<button onclick="logout()">LOGOUT</button>

</div>

<script>

let u="";
let chart;

/* LOGIN */
function login(){
u=user.value;
let p=pass.value;

if(!u||!p)return;

let sp=localStorage.getItem(u+"_p");

if(sp && sp!==p){
alert("Wrong");
return;
}

if(!sp){
localStorage.setItem(u+"_p",p);
localStorage.setItem(u+"_m",0);
localStorage.setItem(u+"_h",JSON.stringify([]));
}

localStorage.setItem("lu",u);
start();
}

/* START */
function start(){
u=localStorage.getItem("lu");

loginPage.classList.add("hidden");
app.classList.remove("hidden");

update();hist();board();draw();
}

/* BALANCE */
function update(){
bal.innerText=localStorage.getItem(u+"_m")||0;
}

/* ADD */
function add(){
let a=+amt.value;
let m=+localStorage.getItem(u+"_m")||0;

m+=a;
localStorage.setItem(u+"_m",m);

log("added "+a);

update();hist();board();draw();
}

/* REMOVE */
function remove(){
let a=+amt.value;
let m=+localStorage.getItem(u+"_m")||0;

m-=a;if(m<0)m=0;

localStorage.setItem(u+"_m",m);

log("removed "+a);

update();hist();board();draw();
}

/* RESET */
function reset(){
localStorage.setItem(u+"_m",0);
localStorage.setItem(u+"_h",JSON.stringify([]));
update();hist();board();draw();
}

/* HISTORY */
function log(t){
let h=JSON.parse(localStorage.getItem(u+"_h")||"[]");
h.unshift(t);
localStorage.setItem(u+"_h",JSON.stringify(h));
}

function hist(){
let h=JSON.parse(localStorage.getItem(u+"_h")||"[]");
hist.innerHTML=h.map(x=>"<div class='item'>"+x+"</div>").join("");
}

/* LEADERBOARD */
function board(){
let arr=[];

for(let i=0;i<localStorage.length;i++){
let k=localStorage.key(i);
if(k.endsWith("_m")){
arr.push({n:k.replace("_m",""),v:+localStorage.getItem(k)});
}
}

arr.sort((a,b)=>b.v-a.v);

board.innerHTML=arr.map((x,i)=>
`<div class='item'><span>#${i+1} ${x.n}</span><span>${x.v}</span></div>`
).join("");
}

/* CHART */
function draw(){
if(!chart){
chart=new Chart(c1,{
type:"line",
data:{labels:["Now"],datasets:[{data:[+localStorage.getItem(u+"_m")||0]}]}
});
}else{
chart.data.datasets[0].data=[+localStorage.getItem(u+"_m")||0];
chart.update();
}
}

/* LOGOUT */
function logout(){
localStorage.removeItem("lu");
location.reload();
}

start();

</script>

</body>
</html>
